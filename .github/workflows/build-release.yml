name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build DMG and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 16 if available, otherwise fall back to latest installed
          if [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            echo "Using default Xcode: $(xcode-select -p)"
          fi
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project WhisprFlow.xcodeproj \
            -scheme WhisprFlow \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            clean build

      - name: Create DMG
        run: |
          BUILD_DIR=$(xcodebuild \
            -project WhisprFlow.xcodeproj \
            -scheme WhisprFlow \
            -configuration Release \
            -showBuildSettings 2>/dev/null \
            | grep '^ *BUILT_PRODUCTS_DIR' \
            | awk '{print $3}')

          mkdir -p ./dist/Whispr
          cp -R "$BUILD_DIR/Whispr.app" ./dist/Whispr/
          ln -s /Applications ./dist/Whispr/Applications

          # Bundle an install script that copies the app and removes the
          # macOS quarantine flag so Gatekeeper doesn't block it.
          cat > "./dist/Whispr/Install Whispr.command" << 'SCRIPT'
#!/bin/bash
set -e

APP_SOURCE="$(cd "$(dirname "$0")" && pwd)/Whispr.app"
DEST="/Applications/Whispr.app"

echo "Installing Whispr..."

# Copy app to /Applications (overwrite if already present)
cp -R "$APP_SOURCE" "$DEST"

# Remove the quarantine extended attribute that triggers Gatekeeper.
# This is safe: Whispr is open-source at https://github.com/product-noob/whispr-app
xattr -cr "$DEST"

echo ""
echo "Done! Whispr has been installed to /Applications."
echo "You can now launch it from Spotlight or your Applications folder."
SCRIPT
          chmod +x "./dist/Whispr/Install Whispr.command"

          hdiutil create \
            -volname "Whispr" \
            -srcfolder ./dist/Whispr \
            -ov -format UDZO \
            ./dist/Whispr.dmg

          rm -rf ./dist/Whispr

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Whispr ${{ github.ref_name }}
          body: |
            ## Install

            1. Download **Whispr.dmg** and open it.
            2. **Double-click "Install Whispr"** in the window — this copies the app to `/Applications` and clears the macOS security flag automatically.
            3. Launch Whispr from Spotlight or your Applications folder.

            ### Why the install script?
            Whispr is not notarized with Apple (that requires a $99/yr developer fee).
            The install script removes the [quarantine flag](https://support.apple.com/en-us/102445)
            that macOS attaches to downloaded files, which is what causes the
            _"Apple could not verify Whispr is free of malware"_ error.
            Whispr is fully open-source — you can audit every line at the link above.

            ### Alternative (manual)
            If you prefer not to use the script, drag Whispr to Applications manually,
            then run this once in Terminal:
            ```
            xattr -cr /Applications/Whispr.app
            ```
          files: dist/Whispr.dmg
          draft: false
          prerelease: false
